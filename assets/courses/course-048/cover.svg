      <stop offset="0%" stop-color="#26456d"/>
      <stop offset="42%" stop-color="#0b1425"/>
      <stop offset="100%" stop-color="#03070e"/>
    </radialGradient>
    <linearGradient id="gold" x1="0%" x2="100%">
