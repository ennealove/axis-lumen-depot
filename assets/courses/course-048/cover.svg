  <circle cx="700" cy="350" r="90" fill="none" stroke="#d9ad4f" stroke-width="1" opacity=".22"/>
  <line x1="700" y1="135" x2="700" y2="565" stroke="#ffd36b" stroke-width="2" opacity=".45"/>
  <line x1="485" y1="350" x2="915" y2="350" stroke="#ffd36b" stroke-width="2" opacity=".18"/>

